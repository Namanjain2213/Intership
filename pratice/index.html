<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <h1>Resume Builder</h1>

    <div class="container">
        <!-- Left: Form Section -->
        <div class="form-section">
            <h2>Enter Details</h2>

            <label for="nameInput">Name:</label>
            <input type="text" id="nameInput" placeholder="Your Name">

            <label for="emailInput">Email:</label>
            <input type="email" id="emailInput" placeholder="Your Email">

            <label for="mobile">Mobile No.:</label>
            <input type="tel" id="mobile" placeholder="Enter Mobile No...">

            <label for="summaryInput">Summary:</label>
            <textarea id="summaryInput" placeholder="Short bio"></textarea>

            <!-- Education Section -->
            <div class="education-details" id="educationContainer">
                <h2>Education Details</h2>
                <div class="education-item">
                    <h3>Post Graduation</h3>
                    <input type="text" placeholder="Enter your university, college and school name">
                    <input type="number" placeholder="Enter your CGPA">
                    <input type="text" placeholder="Enter your session">
                    <button class="remove-btn" onclick="removeEducation(this)">Remove</button>
                </div>
            </div>
            <button id="addEducationBtn">+ Add More Education</button>
            <!-- Project Section -->
            <div class="project-details" id="projectContainer">
                <h2>Projects</h2>
                <div class="project-item">
                    <input type="text" placeholder="Enter your Project Name">
                    <textarea placeholder="Project Description"></textarea>
                    <button class="remove-btn" onclick="removeProject(this)">Remove</button>
                </div>
            </div>
            <button id="addProjectBtn">+ Add More Projects</button>

            <!-- Achievements Section -->
            <div class="achievement-details" id="achievementContainer">
                <h2>Achievements</h2>
                <div class="achievement-item">
                    <input type="text" placeholder="Enter your Achievement">
                    <button class="remove-btn" onclick="removeAchievement(this)">Remove</button>
                </div>
            </div>
            <button id="addAchievementBtn">+ Add More Achievements</button>


            <button onclick="generateResume()">Preview Resume</button>
            <button onclick="downloadResume()">Download PDF</button>
        </div>

        <!-- Right: Resume Preview -->
        <div class="preview-section" id="resumePreview">
            <h2 id="namePreview">Your Name</h2>
            <p id="emailPreview">Your Email</p>
            <p id="summaryPreview">Short Bio</p>
            <div id="educationPreview"></div>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
